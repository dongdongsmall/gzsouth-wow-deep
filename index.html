<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>广州南站 · 超深度研究站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root{--bg:#070b14;--panel:#0d1324;--panel2:#121b31;--ink:#e6ecff;--muted:#95a3c9;--line:#223256;--acc:#61d9ff;--acc2:#a78bfa}
    *{box-sizing:border-box} html,body{margin:0;background:radial-gradient(circle at 85% -10%,#1f2d5a80,transparent 33%),radial-gradient(circle at -5% 20%,#163f5180,transparent 30%),var(--bg);color:var(--ink);font-family:Manrope,"PingFang SC",sans-serif}
    .shell{max-width:1400px;margin:0 auto;padding:14px}
    .hero{padding:22px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(150deg,#0f1730cc,#111b35cc);position:sticky;top:8px;z-index:5;backdrop-filter:blur(8px)}
    .chip{display:inline-block;padding:7px 12px;border:1px solid #2a4377;border-radius:999px;font-size:12px;color:#9bcfff}
    h1{font-family:"Noto Serif SC",serif;font-size:clamp(30px,5.5vw,62px);margin:10px 0 8px;line-height:1.06}
    .desc{max-width:860px;color:var(--muted);font-size:15px;line-height:1.8}
    .layout{display:grid;grid-template-columns:330px 1fr;gap:14px;margin-top:14px}
    aside{position:sticky;top:150px;max-height:calc(100vh - 165px);overflow:auto;padding:12px;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel2));border-radius:18px}
    .toc-title{font-size:12px;letter-spacing:.1em;color:#8da4d8;margin:0 0 8px}
    .l1,.l2,.l3{display:block;text-decoration:none;border-radius:10px;cursor:pointer}
    .l1{padding:10px;background:#172342;color:#dce7ff;font-weight:700;margin:8px 0}
    .l2{padding:8px 10px;margin:4px 0 4px 10px;color:#9fafe0;font-size:14px}
    .l3{padding:6px 10px;margin:2px 0 2px 22px;color:#6fdcff;font-size:13px}
    .l1:hover,.l2:hover,.l3:hover{background:#1f315d}
    main{padding:24px;border-radius:18px;background:#0d1427;border:1px solid var(--line)}
    article h2{font-size:30px;border-bottom:1px solid #20345d;padding-bottom:8px;margin:1.4em 0 .6em}
    article h3{font-size:24px;margin:1.3em 0 .5em;color:#eaf2ff}
    article h4{font-size:18px;margin:1.1em 0 .45em;color:#9de9ff}
    article p,article li{line-height:1.95;color:#ccdaff;font-size:15px}
    article blockquote{margin:1em 0;padding:10px 14px;border-left:3px solid var(--acc2);background:#121d38;border-radius:10px}
    article pre{background:#050916;color:#b9ceff;padding:14px;border-radius:12px;overflow:auto;border:1px solid #1f3765}
    footer{text-align:center;color:#7d8ebb;padding:18px}
    .top{position:fixed;right:12px;bottom:12px;background:linear-gradient(90deg,var(--acc),var(--acc2));color:#071225;border:none;border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.hero{position:relative;top:0}aside{position:relative;top:0;max-height:none}}
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <span class="chip">东东制作 · WOW Deep</span>
      <h1>广州南站：国家级枢纽、城市界面与增长引擎</h1>
      <p class="desc">这是一个“长文可读、结构可跳、信息可追踪”的超深度网页。左侧提供三级菜单：一级=章节，二级=子议题，三级=快速洞察锚点（数据、机制、行动）。已针对 iPhone 阅读做排版适配。</p>
    </section>

    <section class="layout">
      <aside>
        <div class="toc-title">三级菜单</div>
        <div id="toc"></div>
      </aside>
      <main><article id="content"></article></main>
    </section>
    <footer>东东制作</footer>
  </div>
  <button class="top" onclick="window.scrollTo({top:0,behavior:'smooth'})">TOP</button>

  <script>
    const toc = document.getElementById('toc');
    const content = document.getElementById('content');

    function addLink(cls, id, text){ const a=document.createElement('a'); a.className=cls; a.href='#'+id; a.textContent=text; toc.appendChild(a); }

    fetch('./content.md').then(r=>r.text()).then(md=>{
      content.innerHTML = marked.parse(md);
      const h3s=[...content.querySelectorAll('h3')];
      h3s.forEach((h3,i)=>{
        const l1='c'+i; h3.id=l1; addLink('l1',l1,h3.textContent);
        let el=h3.nextElementSibling, sec=0;
        while(el && el.tagName!=='H3'){
          if(el.tagName==='H4'){
            const l2=l1+'-'+sec++; el.id=l2; addLink('l2',l2,el.textContent);
            // 第三级：为该二级标题后的前三段生成“洞察锚点”
            let p=el.nextElementSibling, pIdx=0;
            while(p && p.tagName!=='H4' && p.tagName!=='H3' && pIdx<3){
              if(p.tagName==='P' && p.textContent.trim().length>40){
                const l3=l2+'-p'+pIdx; p.id=l3;
                const label=['洞察','数据','行动'][pIdx] || ('要点'+(pIdx+1));
                addLink('l3',l3,label+' · '+p.textContent.trim().slice(0,14)+'…');
                pIdx++;
              }
              p=p.nextElementSibling;
            }
          }
          el=el.nextElementSibling;
        }
      });
    });
  </script>
</body>
</html>

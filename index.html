<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>广州南站 · 超深度版 | 东东制作</title>
  <style>
    :root{--bg:#070b14;--panel:#0b1220;--card:#0f172a;--ink:#e5e7eb;--muted:#94a3b8;--line:#1f2a44;--c1:#22d3ee;--c2:#818cf8;--c3:#34d399}
    *{box-sizing:border-box} html,body{margin:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:var(--ink);background:radial-gradient(circle at 20% 0,#0d1b33 0,#070b14 38%,#05070d 100%)}
    .noise:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.06;background-image:radial-gradient(#fff 0.6px,transparent 0.6px);background-size:3px 3px}
    .top{position:sticky;top:0;z-index:100;background:rgba(5,10,20,.78);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .top .inner{max-width:1320px;margin:auto;padding:10px 14px;display:flex;gap:12px;align-items:center}
    .logo{font-weight:800;padding:8px 12px;border:1px solid #1e293b;border-radius:999px;background:linear-gradient(90deg,#0b1325,#0f1f35)}
    .menu{display:flex;gap:8px;overflow:auto;white-space:nowrap}
    .menu a{color:#cbd5e1;text-decoration:none;border:1px solid #1f2a44;background:#0b1327;padding:7px 10px;border-radius:10px;font-size:12px}
    .hero{max-width:1320px;margin:auto;padding:26px 14px 10px}
    .title{font-size:clamp(32px,5.6vw,68px);line-height:1.04;margin:0;background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3));-webkit-background-clip:text;background-clip:text;color:transparent}
    .lead{color:var(--muted);max-width:980px;font-size:17px;line-height:1.8;margin-top:12px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .chip{font-size:12px;padding:6px 10px;border:1px solid #1f2a44;border-radius:999px;color:#cbd5e1;background:#0a1222}
    .layout{max-width:1320px;margin:auto;padding:12px 14px;display:grid;grid-template-columns:290px 1fr;gap:16px}
    .toc{position:sticky;top:62px;align-self:start;max-height:calc(100vh - 72px);overflow:auto;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#0a1326,#0a1020);padding:12px}
    .toc h3{margin:0 0 8px;font-size:13px;color:#93c5fd}
    .l2,.l3,.l4{margin:4px 0}
    .l2 a{color:#e2e8f0;text-decoration:none;font-size:13px}
    .l3 a{color:#94a3b8;text-decoration:none;font-size:12px;padding-left:8px;display:block}
    .l4 a{color:#64748b;text-decoration:none;font-size:11px;padding-left:18px;display:block}
    .content{border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#0a1223,#0b1326);padding:18px}
    .sec{padding:18px 2px;border-bottom:1px dashed #1f2a44}
    .sec:last-child{border-bottom:none}
    .h2{font-size:30px;margin:0 0 8px;color:#e2e8f0}
    .h3{font-size:20px;margin:14px 0 8px;color:#67e8f9}
    .h4{font-size:16px;margin:10px 0 6px;color:#a5b4fc}
    p{margin:7px 0;line-height:1.92;color:#cbd5e1}
    .foot{max-width:1320px;margin:14px auto 36px;padding:0 14px;color:#64748b;font-size:13px}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.toc{position:relative;top:0;max-height:none}}
  </style>
</head>
<body class="noise">
  <header class="top">
    <div class="inner">
      <div class="logo">东东制作</div>
      <nav id="topMenu" class="menu"></nav>
    </div>
  </header>

  <section class="hero">
    <h1 class="title">广州南站 · 超深度交互研究</h1>
    <p class="lead">面向“站点—网络—城市—产业”全链路，这是一版强调深度、可读性与移动端体验的长篇网页。内容结构按三级导航组织，支持快速跳转与持续阅读。</p>
    <div class="chips"><span class="chip">三级菜单</span><span class="chip">超长内容</span><span class="chip">手机友好</span><span class="chip">高级暗色视觉</span></div>
  </section>

  <main class="layout">
    <aside class="toc"><h3>三级目录</h3><div id="toc"></div></aside>
    <article class="content" id="content"></article>
  </main>
  <footer class="foot">东东制作 · 广州南站专题（超深度版）</footer>

  <script>
    async function boot(){
      const md = await fetch('content.md').then(r=>r.text());
      const lines = md.split(/\r?\n/);
      const content = document.getElementById('content');
      const toc = document.getElementById('toc');
      const top = document.getElementById('topMenu');
      let sec=null, h2i=0, h3i=0, h4i=0;
      const cf=document.createDocumentFragment(), tf=document.createDocumentFragment();

      for(const raw of lines){
        const line = raw.trim(); if(!line) continue;
        if(/^###\s+/.test(line)){
          h2i++; h3i=0; const t=line.replace(/^###\s+/,'').trim(); const id='h2-'+h2i;
          sec=document.createElement('section'); sec.className='sec'; sec.id=id;
          const h=document.createElement('h2'); h.className='h2'; h.textContent=t; sec.appendChild(h); cf.appendChild(sec);
          const d=document.createElement('div'); d.className='l2'; d.innerHTML=`<a href="#${id}">${t}</a>`; tf.appendChild(d);
          const m=document.createElement('a'); m.href='#'+id; m.textContent=t; top.appendChild(m); continue;
        }
        if(/^####\s+/.test(line) && sec){
          h3i++; h4i=0; const t=line.replace(/^####\s+/,'').trim(); const h=document.createElement('h3'); h.className='h3'; h.textContent=t; sec.appendChild(h);
          const d=document.createElement('div'); d.className='l3'; d.innerHTML=`<a href="#${sec.id}">· ${t}</a>`; tf.appendChild(d); continue;
        }
        if(/^#####\s+/.test(line) && sec){
          h4i++; const t=line.replace(/^#####\s+/,'').trim(); const h=document.createElement('h4'); h.className='h4'; h.textContent=t; sec.appendChild(h);
          const d=document.createElement('div'); d.className='l4'; d.innerHTML=`<a href="#${sec.id}">· ${t}</a>`; tf.appendChild(d); continue;
        }
        if(/^[-*]\s+/.test(line)){ const p=document.createElement('p'); p.textContent='• '+line.replace(/^[-*]\s+/,''); (sec||content).appendChild(p); continue; }
        if(!/^```/.test(line) && !/^>/.test(line)){ const p=document.createElement('p'); p.textContent=line; (sec||content).appendChild(p); }
      }
      content.appendChild(cf); toc.appendChild(tf);
      if(!top.children.length){ top.innerHTML='<a href="#content">阅读正文</a>'; }
    }
    boot();
  </script>
</body>
</html>
